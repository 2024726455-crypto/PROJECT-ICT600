<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment | Badminton Booking System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="payment">
  <main class="page-box">
    <h1>Payment</h1>
    <form id="paymentForm">
      <label>Booking ID <input id="paymentBookingId" type="text" readonly></label>
      <label>Payment Method
        <select id="paymentMethod">
          <option value="Online Banking">Online Banking</option>
          <option value="E-Wallet">E-Wallet</option>
          <option value="Cash">Cash</option>
        </select>
      </label>
      <label>Amount (RM) <input id="paymentAmount" type="number" min="0" step="0.01" readonly></label>
      <label>Payment Date <input id="paymentDate" type="date" required></label>
      <p>Payment Status: <strong id="paymentStatus">Pending</strong></p>
      <button type="submit">Confirm Payment</button>
      <button id="cancelPayment" type="button">Cancel</button>
      <p id="paymentMessage" class="message"></p>
    </form>
    <p><a href="dashboard.html">Back to dashboard</a></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
