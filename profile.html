<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Update Profile | Badminton Booking System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="profile">
  <main class="page-box">
    <h1>Update Profile</h1>
    <form id="profileForm">
      <label>Full Name <input id="profileName" type="text" required></label>
      <label>Phone Number <input id="profilePhone" type="tel" required></label>
      <label>New Password <input id="profilePassword" type="password" required></label>
      <button type="submit">Update Profile</button>
      <p id="profileMessage" class="message"></p>
    </form>
    <p><a href="dashboard.html">Back to dashboard</a></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
