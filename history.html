<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking History | Badminton Booking System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="history">
  <main class="page-box">
    <h1>Booking History</h1>
    <table>
      <thead>
        <tr>
          <th>Booking ID</th>
          <th>Court</th>
          <th>Date</th>
          <th>Time Slot</th>
          <th>Status</th>
          <th>Payment</th>
        </tr>
      </thead>
      <tbody id="historyRows"></tbody>
    </table>
    <p id="historyEmpty" class="message"></p>
    <p><a href="dashboard.html">Back to dashboard</a></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
